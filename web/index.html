<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>AI Course Lab · H5</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
</head>
<body>
  <header class="site-header">
    <h1>AI Course Lab</h1>
    <p class="subtitle">在浏览器中学习与调试 Python / NumPy / Pandas</p>
  </header>

  <main class="container">
    <section class="toolbar">
      <label for="example-select">示例：</label>
      <select id="example-select">
        <option value="blank">空白</option>
        <option value="numpy">NumPy 基础</option>
        <option value="numpy_funcs">NumPy 基础函数</option>
        <option value="pandas">Pandas 基础</option>
        <option value="preprocess">预处理示例</option>
      </select>
      <button id="load-example">加载示例</button>
      <button id="toggle-sidebar">示例库</button>
      <div class="spacer"></div>
      <button id="run-btn" class="primary">运行 ▷</button>
      <button id="clear-btn">清屏</button>
      <button id="copy-btn">复制代码</button>
    </section>

    <section class="editor-section">
      <textarea id="code" spellcheck="false" placeholder="# 在此编写 Python 代码（支持 numpy/pandas）"></textarea>
    </section>

    <section class="output-section">
      <div class="status" id="status">⏳ 正在初始化 Python（Pyodide）...</div>
      <pre id="output" class="output"></pre>
      <pre id="errors" class="errors"></pre>
    </section>
  </main>

  <aside id="sidebar" class="sidebar hidden">
    <div class="sidebar-header">
      <strong>示例库</strong>
      <button id="close-sidebar" title="关闭">×</button>
    </div>
    <div class="sidebar-tabs" id="lib-tabs">
      <button data-lib="numpy" class="active">NumPy</button>
      <button data-lib="pandas">Pandas</button>
    </div>
    <div class="sidebar-search">
      <input id="search-input" placeholder="搜索函数或关键字…" />
    </div>
    <div id="example-list" class="example-list"></div>
  </aside>

  <footer class="site-footer">
    <small>基于 Pyodide 在浏览器运行 Python。适合入门学习与快速试验。</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
  <script src="./app.js" type="module"></script>
</body>
</html>
